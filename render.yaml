services:
  - type: web
    name: innofaso-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false          # à saisir dans le dashboard Render
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false          # ex: https://innofaso.vercel.app
